gappiv = 8
gappoh = 10
gappov = 10
borderpx = 1
border_radius = 12
no_radius_when_single = 0
no_border_when_single = 1

focused_opacity = 1.0
unfocused_opacity = 1.0

scratchpad_width_ratio = 0.8
scratchpad_height_ratio = 0.9

# Window and overlay colors.
rootcolor = 0x191d24ff
bordercolor = 0x2b3038ff
focuscolor = 0x7b8494ff
maximizescreencolor = 0x7b8494ff
urgentcolor = 0xff453aff
scratchpadcolor = 0x8e8e93ff
globalcolor = 0x7b8494ff
overlaycolor = 0x7b8494ff
shadowscolor = 0x00000000

