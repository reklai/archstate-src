blur_layer = 0
blur_optimized = 0
blur_params_num_passes = 1
blur_params_radius = 0
blur_params_noise = 0
blur_params_brightness = 1.0
blur_params_contrast = 1.0
blur_params_saturation = 1.0

# Shadows are disabled for the performance profile.
shadows = 0
layer_shadows = 0
shadow_only_floating = 0
shadows_size = 0
shadows_blur = 0
shadows_position_x = 0
shadows_position_y = 0

# Animations are disabled for the performance profile.
animations = 0
layer_animations = 0
