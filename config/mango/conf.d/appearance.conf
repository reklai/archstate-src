# Gaps, borders, and rounded window shape.
gappih = 10
gappiv = 10
gappoh = 10
gappov = 10
borderpx = 1
border_radius = 10
no_radius_when_single = 0
no_border_when_single = 0

focused_opacity = 1.0
unfocused_opacity = 1.0

scratchpad_width_ratio = 0.8
scratchpad_height_ratio = 0.9

# Window and overlay colors.
rootcolor = 0x202124ff
bordercolor = 0x4a4d52ff
focuscolor = 0x0a84ffff
maximizescreencolor = 0x0a84ffff
urgentcolor = 0xff453aff
scratchpadcolor = 0x5e5ce6ff
globalcolor = 0x64d2ffff
overlaycolor = 0x30d158ff
shadowscolor = 0x000000ff

cursor_theme = capitaine-cursors
cursor_size = 24

# Blur is disabled; Waybar uses plain dark translucency instead.
blur = 0
blur_layer = 0
blur_optimized = 0
blur_params_num_passes = 1
blur_params_radius = 0
blur_params_noise = 0
blur_params_brightness = 1.0
blur_params_contrast = 1.0
blur_params_saturation = 1.0

# Shadows are disabled for a cleaner and lighter desktop.
shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 0
shadows_blur = 0
shadows_position_x = 0
shadows_position_y = 0

# Window open/close uses a subtle macOS-like zoom and fade.
animations = 0
layer_animations = 0
animation_type_open = zoom
animation_type_close = zoom
animation_fade_in = 1
animation_fade_out = 1
zoom_initial_ratio = 0.92
zoom_end_ratio = 0.96
fadein_begin_opacity = 0.65
fadeout_begin_opacity = 0.80
animation_duration_move = 1
animation_duration_open = 260
animation_duration_tag = 210
animation_duration_close = 200
animation_duration_focus = 0
animation_curve_open = 0.16,1.0,0.30,1.0
animation_curve_close = 0.40,0.0,1.0,1.0
animation_curve_move = 0.22,1.0,0.36,1.0
animation_curve_tag = 0.22,1.0,0.36,1.0
animation_curve_focus = 0.46,1.0,0.29,1.0
animation_curve_opafadein = 0.16,1.0,0.30,1.0
animation_curve_opafadeout = 0.40,0.0,1.0,1.0
