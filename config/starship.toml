add_newline = false

format = "$username$hostname$directory$git_branch$git_status$cmd_duration$line_break$character"

[directory]
format = ":$path "
truncation_length = 0
truncate_to_repo = false

[git_branch]
symbol = "git "
format = "$symbol$branch "

[git_status]
format = "$all_status$ahead_behind "

[cmd_duration]
min_time = 1000
format = "took $duration "

[username]
show_always = true
format = "[$user]($style)@"

[hostname]
ssh_only = false
trim_at = ""
format = "[$hostname]($style)"

[character]
success_symbol = '\$'
error_symbol = '\$'
