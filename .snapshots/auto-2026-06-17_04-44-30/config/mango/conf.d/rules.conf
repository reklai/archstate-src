# Steam has mixed normal and floating windows.
windowrule = isfloating:1, appid:[Ss]team
windowrule = isfloating:0, title:Steam
windowrule = isfloating:1, appid:steam, title:Steam Settings

# Keep the audio mixer as a centered terminal-sized utility panel.
windowrule = isfloating:1, width:760, height:520, animation_type_open:zoom, animation_type_close:zoom, appid:.*[Pp]avucontrol

# Selection overlays should not animate or blur.
layerrule = noanim:1, noblur:1, layer_name:selection
