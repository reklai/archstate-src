# Session target and authentication agent.
exec-once = systemctl --user start mango-session.target

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Desktop UI.
exec-once = ~/.config/waybar/scripts/wallpaper.sh restore
exec-once = swaync
exec-once = waybar

# Display hotplug and clipboard history.
exec-once = ~/.config/mango/scripts/display-watch.sh
exec-once = sh -c 'wl-paste --type text --watch cliphist store &'
exec-once = sh -c 'wl-paste --type image --watch cliphist store &'
