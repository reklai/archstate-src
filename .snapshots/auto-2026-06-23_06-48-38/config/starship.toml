add_newline = false

format = "$directory$git_branch$git_status$cmd_duration$line_break$character"

[character]
success_symbol = "->"
error_symbol = "->"

[directory]
format = "$path "
truncation_length = 3
truncate_to_repo = false

[git_branch]
symbol = "git "
format = "$symbol$branch "

[git_status]
format = "$all_status$ahead_behind "

[cmd_duration]
min_time = 1000
format = "took $duration "
